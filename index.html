function genLine(rarity){
 var pts=[],n=240;var p=100;
 function ns(s){if(s===undefined)s=1;return(Math.random()-.5)*s}
 switch(rarity){
  case "N":for(var i=0;i<n;i++){var t=i/n;if(t<.08)p+=.5+ns(1)+Math.sin(t*40)*.8;else if(t<.18)p+=1.2+ns(1.2)+Math.sin(t*30)*1.2;else if(t<.28)p+=2+ns(1.5)+Math.sin(t*20)*1.5;else if(t<.35)p-=.8+ns(2);else if(t<.42)p+=2.8+ns(1.2);else if(t<.45)p+=ns(8);else if(t<.48)p-=ns(7)+1;else if(t<.50)p+=ns(9);else if(t<.53)p-=ns(6);else if(t<.58)p-=1+ns(2);else if(t<.62)p+=.5+ns(2.5);else if(t<.68)p-=2+ns(1.5);else if(t<.75)p-=3+ns(2)+Math.sin(t*15)*2;else p-=5+Math.random()*4+Math.pow((t-.75)*5,2)*4;pts.push(Math.max(2,p))}break;
  case "R":for(var i=0;i<n;i++){var t=i/n;if(t<.1)p+=.8+ns(1.5)+Math.sin(t*35);else if(t<.2)p+=ns(2.5)+Math.sin(t*25)*1.8;else if(t<.3)p+=1+ns(1.5)+Math.sin(t*18)*1.2;else if(t<.38)p-=.5+ns(2)+Math.sin(t*20);else if(t<.42)p+=ns(2.5);else if(t<.45)p+=ns(7);else if(t<.48)p+=ns(6)+1;else if(t<.50)p-=ns(8);else if(t<.55)p+=.8+ns(2);else if(t<.62)p-=.3+ns(2)+Math.sin(t*12)*1.5;else if(t<.7)p+=.5+ns(1.5);else if(t<.78)p-=.8+ns(1.5)+Math.sin(t*10);else p-=1.5+ns(1)+Math.pow((t-.78)*4,1.5);pts.push(Math.max(8,p))}break;
  case "SR":for(var i=0;i<n;i++){var t=i/n;if(t<.06)p+=.5+ns(1);else if(t<.14)p+=2.5+ns(1.5)+Math.sin(t*25)*1.5;else if(t<.22)p-=2+ns(1.5)+Math.sin(t*20);else if(t<.28)p+=.8+ns(2)+Math.sin(t*30)*1.5;else if(t<.35)p+=2+ns(1.2)+Math.sin(t*15)*2;else if(t<.40)p-=1.5+ns(2);else if(t<.44)p+=ns(9);else if(t<.47)p-=ns(8)+2;else if(t<.50)p+=ns(10)+3;else if(t<.53)p-=ns(7);else if(t<.58)p+=1.5+ns(2)+Math.sin(t*22)*2;else if(t<.65)p+=.8+ns(2.5)+Math.sin(t*18)*1.5;else if(t<.72)p-=.5+ns(2);else if(t<.80)p+=2+ns(1.5)+Math.sin(t*12)*1.5;else if(t<.88)p+=1.5+ns(1.2);else p+=2+ns(1)+Math.sin(t*30);pts.push(Math.max(15,p))}break;
  case "SSR":for(var i=0;i<n;i++){var t=i/n;if(t<.08)p+=.8+ns(1.2)+Math.sin(t*30);else if(t<.15)p-=1+ns(1.5)+Math.sin(t*20)*1.2;else if(t<.22)p-=.5+ns(2)+Math.sin(t*15)*1.5;else if(t<.28)p+=.3+ns(2);else if(t<.33)p-=1+ns(1.5);else if(t<.38)p+=.5+ns(2.5)+Math.sin(t*25)*1.5;else if(t<.42)p+=ns(10);else if(t<.45)p+=ns(9)+4;else if(t<.48)p-=ns(7);else if(t<.51)p+=ns(8)+5;else if(t<.55)p+=2+ns(2);else if(t<.62)p+=2.5+ns(1.2)+Math.sin(t*15)*1.5;else if(t<.68)p-=.8+ns(1.5);else if(t<.75)p+=2+ns(1)+Math.sin(t*12);else if(t<.83)p+=3+ns(1.2);else p+=4+ns(1.5)+Math.pow(t-.83,1.5)*20;pts.push(p)}break;
  case "GOLD":for(var i=0;i<n;i++){var t=i/n;if(t<.08)p+=ns(1.5)+Math.sin(t*25);else if(t<.15)p-=.5+ns(1)+Math.sin(t*20)*.8;else if(t<.22)p+=ns(2)+Math.sin(t*15)*1.2;else if(t<.28)p-=.3+ns(1.5);else if(t<.32)p+=.5+ns(2)+Math.sin(t*30);else if(t<.36)p-=ns(2);else if(t<.40)p+=ns(12);else if(t<.43)p+=ns(10)+6;else if(t<.46)p-=ns(8);else if(t<.50)p+=ns(9)+8;else if(t<.54)p+=3+ns(2);else if(t<.60)p+=3+ns(1.5)+Math.sin(t*18)*2;else if(t<.66)p+=3.5+ns(1.2)+Math.sin(t*12)*1.5;else if(t<.72)p-=1+ns(1.5);else if(t<.78)p+=4+ns(1);else p+=6+Math.pow(t-.78,2)*40+ns(1.5);pts.push(p)}break;
  case "SECRET":for(var i=0;i<n;i++){var t=i/n;if(t<.06)p+=.3+ns(1)+Math.sin(t*25)*.8;else if(t<.12)p-=1+ns(1)+Math.sin(t*20);else if(t<.18)p-=1.5+ns(1.5)+Math.sin(t*15)*1.2;else if(t<.24)p-=.8+ns(2)+Math.sin(t*10)*1.5;else if(t<.30)p+=.5+ns(2);else if(t<.35)p-=1+ns(1.5)+Math.sin(t*12);else if(t<.38)p-=.3+ns(2);else if(t<.42)p+=ns(15);else if(t<.45)p+=ns(13)+10;else if(t<.48)p-=ns(11);else if(t<.51)p+=ns(12)+12;else if(t<.54)p+=6+ns(3);else if(t<.58)p+=4+ns(2)+Math.sin(t*15)*2;else if(t<.64)p+=5+ns(1.5)+Math.sin(t*12)*2;else if(t<.68)p-=1+ns(1.5);else if(t<.74)p+=6+ns(1.2);else if(t<.80)p+=7+ns(1.5)+Math.sin(t*20)*2;else if(t<.86)p+=8+ns(1);else p+=12+Math.pow(t-.86,2)*80+ns(2);pts.push(p)}break;
 }
 return pts;
}
function genVol(n){return Array.from({length:n},function(){return{v:10+Math.random()*70,b:Math.random()>.42}})}
function runChart(cv, rarity, onDone) {
 var animId = null;
 if(!cv)return;
  var ctx=cv.getContext("2d");
  var dpr=Math.min(window.devicePixelRatio||1,2);
  cv.width=400*dpr;cv.height=260*dpr;ctx.scale(dpr,dpr);
  var W=400,H=260;
  var line=genLine(rarity),vol=genVol(55),cfg=RC[rarity];
  var minP=Math.min(...line)-10,maxP=Math.max(...line)+10,pR=maxP-minP;
  var cL=12,cR=W-12,cT=72,cB=H-48,cW=cR-cL,cH=cB-cT;
  var total=line.length,dur=7500;
  var holders=1800+Math.floor(Math.random()*1200);
  var mainCol=["SECRET","GOLD"].includes(rarity)?cfg.glow:["SSR","SR"].includes(rarity)?"#a78bfa":"#22d3ee";
  var start=null,done=false,lastSndT=0;
  var gS=0.38,gE=0.52;
  var startPrice=line[0],endPrice=line[line.length-1];
  var isUp=endPrice>startPrice;

  function draw(ts){
   if(!start)start=ts;
   var el=ts-start,rawP=Math.min(el/dur,1);
   var prog;
   if(rawP<.35)prog=rawP/.35*.36;
   else if(rawP<.55)prog=.36+(rawP-.35)/.2*.16;
   else if(rawP<.75)prog=.52+(rawP-.55)/.2*.28;
   else prog=.80+(rawP-.75)/.25*.20;
   prog=Math.min(prog,1);
   var cur=Math.min(Math.floor(prog*total),total);
   var curT=cur/total;
   var inG=curT>=gS&&curT<=gE;
   var gI=inG?Math.sin((curT-gS)/(gE-gS)*Math.PI):0;
   var preG=curT>=gS-.08&&curT<gS;
   var preI=preG?((curT-(gS-.08))/.08):0;
   var postG=curT>gE;
   var postI=postG?Math.min((curT-gE)/(1-gE),1):0;
   var isMooning=postG&&isUp&&postI>.3;
   var isCrashing=postG&&!isUp&&postI>.3;
   if(el-lastSndT>350){lastSndT=el;if(inG){sfxChartPump(200+gI*500)}else if(isMooning){sfxChartPump(400+postI*300)}else if(isCrashing){sfxChartPump(80)}}

   ctx.save();
   if(inG)ctx.translate((Math.random()-.5)*gI*16,(Math.random()-.5)*gI*12);
   else if(preG)ctx.translate((Math.random()-.5)*preI*3,(Math.random()-.5)*preI*2);
   else if(isMooning&&postI>.6)ctx.translate((Math.random()-.5)*postI*3,(Math.random()-.5)*postI*2);

   ctx.clearRect(-20,-20,W+40,H+40);
   ctx.fillStyle="#0c0f18";ctx.fillRect(0,0,W,H);

   if(preG){for(var i=0;i<8;i++){if(Math.random()<preI*.4){ctx.fillStyle="rgba(255,255,255,"+(preI*.05)+")";ctx.fillRect(Math.random()*W,Math.random()*H,Math.random()*40+5,1)}}}

   if(inG){
    for(var i=0;i<H;i+=2+Math.floor(Math.random()*3)){if(Math.random()<gI*.6){ctx.fillStyle="rgba("+(Math.random()>.5?"255,0,50":"0,255,100")+","+(gI*.22)+")";ctx.fillRect((Math.random()-.5)*gI*30,i,W,1+Math.random()*4)}}
    for(var b=0;b<3;b++){if(Math.random()<gI*.4){ctx.fillStyle="rgba("+(Math.random()>.5?"255,0,80":"80,255,0")+","+(gI*.15)+")";ctx.fillRect(Math.random()*W,Math.random()*H,20+Math.random()*80,5+Math.random()*25)}}
   }

   if(isMooning){
    var mi=(postI-.3)/.7;
    for(var i=0;i<Math.floor(mi*10);i++){
     var px=Math.random()*W,py=H-Math.random()*H*mi;
     ctx.beginPath();ctx.arc(px,py,1+Math.random()*2,0,Math.PI*2);
     ctx.fillStyle="rgba(34,197,94,"+(mi*.15)+")";ctx.fill();
    }
    var gg=ctx.createLinearGradient(0,H,0,H*(1-mi*.5));
    gg.addColorStop(0,cfg.glow+"35");gg.addColorStop(1,"transparent");
    ctx.fillStyle=gg;ctx.fillRect(0,0,W,H);
   }
   if(isCrashing){
    var ci=(postI-.3)/.7;
    ctx.fillStyle="rgba(255,0,0,"+(ci*.1)+")";ctx.fillRect(0,0,W,H);
    for(var i=0;i<Math.floor(ci*5);i++){ctx.fillStyle="rgba(239,68,68,"+(ci*.15)+")";ctx.fillRect(Math.random()*W,Math.random()*H*ci,2,3+Math.random()*5)}
   }

   var gridCol=inG?"rgba(255,"+(Math.random()*100|0)+","+(Math.random()*100|0)+",0.07)":isMooning?"rgba(34,197,94,"+(0.03+postI*0.02)+")":"rgba(255,255,255,0.025)";
   ctx.strokeStyle=gridCol;ctx.lineWidth=.5;
   for(var i=0;i<=7;i++){var y=cT+(cH/7)*i;ctx.beginPath();ctx.moveTo(cL,y);ctx.lineTo(cR,y);ctx.stroke()}
   for(var i=0;i<=8;i++){var x=cL+(cW/8)*i;ctx.beginPath();ctx.moveTo(x,cT);ctx.lineTo(x,cB);ctx.stroke()}

   var lp=cur>0?line[cur-1]:100;var pct=((lp-100)/100*100);
   ctx.font="bold 24px Orbitron,monospace";
   if(inG){ctx.fillStyle=Math.random()>.3?"#ff0040":"#00ff80";var fp=lp+(Math.random()-.5)*gI*lp*.15;ctx.fillText("$"+(fp*.00002156).toFixed(6),cL+2,26)}
   else if(isMooning&&postI>.5){var hue=120+Math.sin(el*.01)*20;ctx.fillStyle="hsl("+hue+",80%,"+(55+Math.sin(el*.015)*10)+"%)";ctx.fillText("$"+(lp*.00002156).toFixed(6),cL+2,26)}
   else{ctx.fillStyle="#fff";ctx.fillText("$"+(lp*.00002156).toFixed(6),cL+2,26)}

   ctx.font="10px monospace";ctx.fillStyle="#666";ctx.fillText("$MICRO / USDT",cL+2,42);
   ctx.font="bold 20px Orbitron,monospace";
   if(inG&&Math.random()>.4)ctx.fillStyle=Math.random()>.5?"#ff0040":"#00ff80";
   else ctx.fillStyle=pct>=0?"#22c55e":"#ef4444";
   ctx.textAlign="right";ctx.fillText((pct>=0?"+":"")+pct.toFixed(1)+"%",cR-2,26);
   if(Math.abs(pct)>30&&postG){
    ctx.fillStyle=pct>0?"rgba(34,197,94,"+(0.3+Math.sin(el*.01)*.2)+")":"rgba(239,68,68,"+(0.3+Math.sin(el*.01)*.2)+")";
    ctx.fillRect(cR-105,8,105,28);
    ctx.fillStyle=pct>0?"#22c55e":"#ef4444";ctx.font="bold 20px Orbitron,monospace";
    ctx.fillText((pct>=0?"+":"")+pct.toFixed(1)+"%",cR-2,26);
   }
   ctx.font="10px sans-serif";ctx.fillStyle="#888";ctx.textAlign="right";
   ctx.fillText("holders: "+holders.toLocaleString(),cR-2,42);ctx.textAlign="left";
   ctx.font="bold 8px Orbitron,monospace";ctx.fillStyle="rgba(255,255,255,0.15)";ctx.textAlign="center";ctx.fillText("$MICRO PRICE ACTION",W/2,64);ctx.textAlign="left";

   if(cur<2){animId=requestAnimationFrame(draw);ctx.restore();return}

   ctx.beginPath();ctx.moveTo(cL,cB);
   for(var i=0;i<cur;i++)ctx.lineTo(cL+(i/(total-1))*cW,cT+((maxP-line[i])/pR)*cH);
   var lx=cL+((cur-1)/(total-1))*cW,ly=cT+((maxP-line[cur-1])/pR)*cH;
   ctx.lineTo(lx,cB);ctx.closePath();
   var gr=ctx.createLinearGradient(0,cT,0,cB);
   var ac=inG?(Math.random()>.5?"#ff004040":"#00ff8040"):isMooning?(cfg.glow+"50"):mainCol+"35";
   gr.addColorStop(0,ac);gr.addColorStop(.6,mainCol+"0a");gr.addColorStop(1,"transparent");ctx.fillStyle=gr;ctx.fill();

   var lineCol=inG?(Math.random()>.3?"#ff0040":"#00ff80"):isMooning&&postI>.5?cfg.glow:mainCol;
   ctx.shadowColor=lineCol;ctx.shadowBlur=inG?20:isMooning?12+postI*10:preG?10+preI*5:8;
   ctx.beginPath();ctx.strokeStyle=lineCol;ctx.lineWidth=inG?4:isMooning?3+postI:2.5;ctx.lineJoin="round";ctx.lineCap="round";
   for(var i=0;i<cur;i++){var x=cL+(i/(total-1))*cW,y=cT+((maxP-line[i])/pR)*cH;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)}
   ctx.stroke();ctx.shadowBlur=0;

   var gs=inG?12+Math.random()*8:isMooning?6+postI*10+Math.sin(el*.01)*3:preG?4+preI*4+Math.sin(el*.01)*2:4+Math.sin(el*.008)*2;

function kyuin(startF,peakF,t,dur,vol){
 var ac=getAudio();if(!ac)return;
 for(var h=0;h<4;h++){
  var o=ac.createOscillator(),g=ac.createGain();
  o.type=h<2?"sine":"triangle";
  var m=h===0?1:h===1?2:h===2?1.5:3;
  o.frequency.setValueAtTime(startF*m,t);
  o.frequency.exponentialRampToValueAtTime(peakF*m,t+dur*0.25);
  o.frequency.setValueAtTime(peakF*m,t+dur*0.25);
  o.frequency.exponentialRampToValueAtTime(startF*m*1.3,t+dur*0.9);
  var v=h===0?vol:h===1?vol*0.5:h===2?vol*0.4:vol*0.2;
  g.gain.setValueAtTime(v,t);
  g.gain.setValueAtTime(v*0.9,t+dur*0.2);
  g.gain.exponentialRampToValueAtTime(0.002,t+dur*0.95);
  o.connect(g);g.connect(ac.destination);o.start(t);o.stop(t+dur);
 }
}

 }
}

  +'<div style="background:linear-gradient(135deg,rgba(139,92,246,.08),rgba(236,72,153,.08));border-radius:9px;padding:5px 10px;margin-bottom:5px;border:1px solid rgba(139,92,246,.1);display:flex;align-items:center;justify-content:space-between;gap:6px"><div style="font-size:10px;font-weight:800;color:#fff">📸 \u30B9\u30AF\u30B7\u30E7\u3057\u3066X\u306B\u5171\u6709\uFF01</div><button onclick="shareX()" style="padding:4px 10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:7px;color:#fff;font-size:9px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:3px;flex-shrink:0"><svg width=10 height=10 viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>\u5171\u6709</button></div>'
  +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;padding:0 2px"><div><div style="font-size:6px;color:#333;letter-spacing:3px;font-family:monospace">RESULT</div><div style="font-size:18px;font-weight:900;background:linear-gradient(135deg,#FFD700,#EC4899,#8B5CF6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.1">'+fmt(state.score)+' pts</div></div></div>'
  +'<div style="background:linear-gradient(145deg,#10111a,#161828);border-radius:10px;padding:5px;border:1px solid rgba(139,92,246,.08);margin-bottom:5px"><div style="display:grid;grid-template-columns:repeat(5,1fr);gap:2px">'+grid+'</div></div>'
  +'<div style="background:rgba(10,10,18,.8);border-radius:7px;padding:5px;margin-bottom:5px;border:1px solid rgba(255,255,255,.025)">'+list+'</div>'
  +'<div style="text-align:center;margin-bottom:5px"><div style="font-size:5px;color:#222;font-family:monospace;letter-spacing:2px">PRODUCED BY</div><div style="display:flex;justify-content:center;gap:4px;margin-top:1px;font-size:6px"><a href="https://x.com/aoiao901" target="_blank" style="color:#8B5CF6;font-weight:800;font-family:monospace;text-decoration:none">@aoiao901</a><span style="color:#222">\u00D7</span><a href="https://x.com/inmucoin" target="_blank" style="color:#EC4899;font-weight:800;font-family:monospace;text-decoration:none">@inmucoin</a></div></div>'
  +'<div style="display:flex;gap:5px;justify-content:center"><button onclick="shareX()" style="padding:8px 16px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:9px;color:#fff;font-size:10px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:4px"><svg width=12 height=12 viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>X\u3067\u5171\u6709</button><button onclick="resetGame()" style="padding:8px 16px;background:rgba(139,92,246,.06);border:1px solid rgba(139,92,246,.1);border-radius:9px;color:#a78bfa;font-size:10px;font-weight:700;cursor:pointer">\u3082\u30461\u30BB\u30C3\u30C8</button></div></div>';
}

function renderCollection(){
 var html='<div style="text-align:center;margin-bottom:8px"><div style="font-size:12px;font-weight:800;background:linear-gradient(135deg,#8B5CF6,#EC4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent">\u30B3\u30EC\u30AF\u30B7\u30E7\u30F3 ('+state.coll.length+'/'+CD.length+')</div></div>';
 for(var ri=0;ri<RO.length;ri++){
  var r=RO[ri],cards=CD.filter(function(c){return c.r===r});
  if(!cards.length)continue;var cfg=RC[r];
  html+='<div style="margin-bottom:12px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px"><span style="display:inline-block;padding:1px 7px;border-radius:4px;background:'+cfg.bg+';background-size:200% 200%;animation:hs 4s linear infinite;font-size:7px;font-weight:800;color:'+(r==="N"?"#fff":"#0a0a1a")+';font-family:monospace">'+cfg.label+'</span><span style="font-size:6px;color:#222;font-family:monospace">'+cfg.pct+'% | '+cfg.pts+'pts</span></div><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:4px">';
  for(var ci=0;ci<cards.length;ci++){
   var cc=cards[ci],own=state.coll.find(function(x){return x.id===cc.id});
   html+='<div style="border-radius:6px;overflow:hidden;position:relative;border:1px solid '+(own?cfg.glow+'28':'#111118')+';opacity:'+(own?1:.14)+';filter:'+(own?'none':'grayscale(1)')+'"><img src="data:image/jpeg;base64,'+cc.b64+'" style="width:100%;display:block"><div style="position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.9));padding:8px 2px 2px;text-align:center"><div style="font-size:6px;font-weight:700">'+cc.jp+'</div><div style="font-size:5px;color:#FFD700;font-family:monospace">'+cc.pts+'pts</div></div></div>';
  }
  html+='</div></div>';
 }
 return html;
}

var chartRunning=false;
function updateOverlays(){
 var bo=document.getElementById("bo-overlay");
 var fl=document.getElementById("flash-overlay");
 if(bo){bo.style.display=state.bo>0?"block":"none";bo.style.background="rgba(0,0,0,"+state.bo+")";}
 if(fl){fl.style.display=state.flash?"block":"none";}
}
function render(skipChart){
 updateOverlays();
 if(skipChart)return;
 var content='';
 if(state.phase==="summary"){content=renderSummary();}
 else if(state.tab==="gacha"){
  if(state.phase==="idle")content=renderIdle();
  else if(state.phase==="chart")content=renderChart();
  else if(state.phase==="blackout")content='<div style="height:260px"></div>';
  else if(state.phase==="reveal")content=renderReveal();
 }else if(state.tab==="collection"){
  content=renderCollection();
 }
 document.getElementById("app").innerHTML=renderHeader()+renderStats()+renderTabs()
  +'<div style="padding:0 8px 8px;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch">'+content+'</div>';
}
function startChart(){
 var cv=document.getElementById("chartCanvas");
 if(cv&&state.card){
  if(chartCleanup)chartCleanup();
  chartRunning=true;
  chartCleanup=runChart(cv,state.card.r,onChartDone);
 }
}

render();

}catch(e){
 document.getElementById("err").textContent="Error: "+e.message;
}
</script>
